server:
  port: 8080

spring:
  application:
    name: transaction-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/paymentdb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        retries: 2147483647
        spring.json.add.type.headers: false
    consumer:
      group-id: transaction-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "hp.microservice.demo.transaction_service.event"
        spring.json.value.default.type: "hp.microservice.demo.transaction_service.event.PaymentResultEvent"
        spring.json.use.type.headers: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak.localhost:8090/realms/payments}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://keycloak.localhost:8090/realms/payments/protocol/openid-connect/certs}

grpc:
  client:
    fraud-service:
      address: "static://${FRAUD_SERVICE_GRPC_HOST:localhost}:${FRAUD_SERVICE_GRPC_PORT:9090}"
      negotiation-type: plaintext
    fx-service:
      address: "static://${FX_SERVICE_GRPC_HOST:localhost}:${FX_SERVICE_GRPC_PORT:9090}"
      negotiation-type: plaintext

resilience4j:
  circuitbreaker:
    instances:
      fraud-service:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedCallsInHalfOpenState: 3
      fx-service:
        slidingWindowSize: 20
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedCallsInHalfOpenState: 3
  retry:
    instances:
      fraud-service:
        maxAttempts: 2
        waitDuration: 200ms
      fx-service:
        maxAttempts: 2
        waitDuration: 200ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  config: classpath:logback-spring.xml
  level:
    hp.microservice.demo.transaction_service.logging: INFO
  payload:
    enabled: false
