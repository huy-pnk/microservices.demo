elasticsearchHosts: "http://elasticsearch-master:9200"
protocol: http

kibanaConfig:
  kibana.yml: |
    elasticsearch.hosts: ["http://elasticsearch-master:9200"]
    xpack.encryptedSavedObjects.encryptionKey: "a-32-char-local-dev-key-00000000"

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  type: ClusterIP
  port: 5601
