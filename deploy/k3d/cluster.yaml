apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: micro
servers: 1
agents: 2
ports:
  - port: "8090:80"
    nodeFilters:
      - loadbalancer
  - port: "8443:443"
    nodeFilters:
      - loadbalancer
options:
  k3s:
    extraArgs:
      - arg: --disable=metrics-server
        nodeFilters:
          - server:*
