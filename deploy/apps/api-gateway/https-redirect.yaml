# Traefik Middleware: redirect HTTP → HTTPS for the api-gateway host.
# Applied via the annotation on the HTTPS Ingress:
#   traefik.ingress.kubernetes.io/router.middlewares: app-redirect-to-https@kubernetescrd
#
# This catches requests arriving on host port 8090 (Traefik's HTTP/web entrypoint)
# and issues a 301 to the same path on HTTPS (host port 8443).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-to-https
  namespace: app
spec:
  redirectScheme:
    scheme: https
    permanent: true   # 301 — browsers and curl -L will follow
---
# HTTP-entrypoint Ingress that exists solely to trigger the redirect middleware.
# Without this, requests on port 8090 simply get a 404 from Traefik.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-http-redirect
  namespace: app
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: app-redirect-to-https@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: api.payment.test
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
